# .github/workflows/ci.yml — CI for agentic-guardrail-ts itself
# Validates reference configs, shell scripts, and JSON files.
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      # ── Validate shell scripts ──
      - name: Shellcheck
        run: |
          sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh

      # ── Validate JSON files ──
      - name: JSON validation
        run: |
          for f in $(find reference/ -name '*.json'); do
            echo "Validating $f..."
            node -e "JSON.parse(require('fs').readFileSync('$f', 'utf8'))"
          done

      # ── Verify no broken internal links ──
      - name: Check for stale references
        run: |
          # Ensure no references to deleted directories
          if grep -r 'configs/' --include='*.md' skills/ docs/ README.md 2>/dev/null | grep -v 'reference/'; then
            echo "ERROR: Found references to deleted configs/ directory"
            exit 1
          fi
          if grep -r 'agents/' --include='*.md' skills/ docs/ README.md 2>/dev/null; then
            echo "ERROR: Found references to deleted agents/ directory"
            exit 1
          fi
          if grep -r 'examples/' --include='*.md' skills/ docs/ README.md 2>/dev/null | grep -v 'reference/'; then
            echo "ERROR: Found references to deleted examples/ directory"
            exit 1
          fi
          echo "No stale references found."

      # ── Verify raw URLs use correct branch ──
      - name: Check branch references
        run: |
          if grep -r '/master/' --include='*.md' .; then
            echo "ERROR: Found /master/ in URLs — should be /main/"
            exit 1
          fi
          echo "All URLs use correct branch."
